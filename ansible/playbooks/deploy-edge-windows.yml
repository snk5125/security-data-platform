# =============================================================================
# Playbook — Deploy Cribl Edge to Windows Hosts
# =============================================================================
# Installs and configures Cribl Edge on all Windows workload instances across
# AWS, Azure, and GCP.
#
# Prerequisites:
#   1. Workload roots must be applied (Terraform) so VMs are running.
#   2. WinRM HTTPS must be bootstrapped on each Windows VM (done via user_data
#      / custom_data / startup script in the workload-account-baseline modules).
#   3. Run build-inventory.sh to generate inventory/hosts.json:
#        cd ansible/inventory && bash build-inventory.sh
#   4. Set fleet leader URL and token as extra-vars:
#        -e cribl_fleet_leader_url=tcp://main-...:4200
#        -e cribl_fleet_token=<enrollment-token>
#
# Usage:
#   cd ansible
#   ansible-playbook playbooks/deploy-edge-windows.yml \
#     -e cribl_fleet_leader_url="tcp://main-YOUR_ORG.cribl.cloud:4200" \
#     -e cribl_fleet_token="YOUR_FLEET_TOKEN"
# =============================================================================

---
- name: Deploy Cribl Edge to Windows workload instances
  hosts: windows

  roles:
    - cribl-edge-windows
