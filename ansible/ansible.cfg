# =============================================================================
# Ansible Configuration — Cribl Edge Deployment
# =============================================================================
# Shared configuration for all playbooks in this project.
# Inventory is built dynamically by inventory/build-inventory.sh from
# Terraform state across all workload roots.
# =============================================================================

[defaults]
inventory         = inventory/
roles_path        = roles/
host_key_checking = False
timeout           = 30
retry_files_enabled = False

[privilege_escalation]
become        = True
become_method = sudo

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
