# =============================================================================
# Handlers — cribl-edge-linux
# =============================================================================

- name: restart cribl-edge
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: restarted
    daemon_reload: true

- name: restart auditd
  ansible.builtin.command:
    cmd: service auditd restart
  # auditd doesn't support systemctl restart — must use service command
