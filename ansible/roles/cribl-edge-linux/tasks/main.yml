# =============================================================================
# Tasks — cribl-edge-linux
# =============================================================================
# Installs Cribl Edge in edge-managed mode, registers with the fleet leader,
# and enables the systemd service.
#
# Required runtime variables (not defaulted — must be passed via extra-vars):
#   cribl_fleet_leader_url  — Cribl.Cloud leader URL (e.g. tcp://main-...:4200)
#   cribl_fleet_token       — Fleet enrollment token
#
# Per-host variables (set by inventory):
#   cribl_cloud     — aws | azure | gcp
#   cribl_workload  — workload alias (e.g. aws-workload-a)
# =============================================================================

- name: Check if Cribl Edge is already installed
  ansible.builtin.stat:
    path: "{{ install_dir }}/bin/cribl"
  register: cribl_binary

# Use the Cribl Cloud bootstrap script rather than a CDN tarball.
# The bootstrap script is hosted by the leader node and pins the correct
# version, group, and install directory automatically. We override
# CRIBL_AUTH_TOKEN and CRIBL_TAGS via environment variables.
- name: Download Cribl Cloud bootstrap script
  ansible.builtin.get_url:
    url: "{{ cribl_fleet_leader_url }}/init/install-edge.sh"
    dest: "/tmp/install-cribl-edge.sh"
    mode: "0755"
  when: not cribl_binary.stat.exists

- name: Run bootstrap script to install and enroll Cribl Edge
  ansible.builtin.command:
    cmd: /tmp/install-cribl-edge.sh
  environment:
    CRIBL_AUTH_TOKEN: "{{ cribl_fleet_token }}"
    CRIBL_TAGS: '["cribl_cloud:{{ cribl_cloud }}", "cribl_workload:{{ cribl_workload }}"]'
  args:
    creates: "{{ install_dir }}/bin/cribl"
  when: not cribl_binary.stat.exists
  notify: restart cribl-edge

- name: Clean up bootstrap script
  ansible.builtin.file:
    path: "/tmp/install-cribl-edge.sh"
    state: absent

# ---------------------------------------------------------------------------
# Switch Cribl Edge to run as root.
# The bootstrap script creates a 'cribl' user and configures the systemd unit
# to run as that user, but Edge needs root to read system logs (auth.log,
# syslog) and run ausearch without sudo.
# ---------------------------------------------------------------------------

- name: Stop Cribl Edge before ownership change
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: stopped
  when: not cribl_binary.stat.exists

- name: Change Cribl install directory ownership to root
  ansible.builtin.file:
    path: "{{ install_dir }}"
    owner: root
    group: root
    recurse: true
  when: not cribl_binary.stat.exists

- name: Update systemd unit to run as root instead of cribl user
  ansible.builtin.replace:
    path: /etc/systemd/system/cribl-edge.service
    regexp: '^User=cribl$'
    replace: 'User=root'
  when: not cribl_binary.stat.exists
  notify: restart cribl-edge

- name: Ensure Cribl Edge service is started and enabled
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: started
    enabled: true
    daemon_reload: true

# ---------------------------------------------------------------------------
# Auditd EXECVE rules.
# Amazon Linux 2023 ships with "-a never,task" which disables all syscall
# auditing.  We replace the rules with a targeted set that captures command
# execution (execve) for all users, giving Cribl Edge full process visibility
# via the existing ausearch source.
# ---------------------------------------------------------------------------

- name: Deploy auditd rules for command execution tracking
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/50-execve.rules
    owner: root
    group: root
    mode: "0640"
    content: |
      # Track all process executions (execve syscall) for security monitoring.
      # Key "cmd" tags these events for easy filtering in ausearch/auditd pipeline.
      -a always,exit -F arch=b64 -S execve -k cmd
      -a always,exit -F arch=b32 -S execve -k cmd
  notify: restart auditd

- name: Remove default never/task rules that disable syscall auditing
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/audit.rules
    regexp: '^-a (never,task|task,never)'
    state: absent
  notify: restart auditd

# ---------------------------------------------------------------------------
# Bash history persistence.
# Amazon Linux 2023 does not set HISTFILE by default in non-login shells,
# and interactive sessions only flush on clean exit.  Drop a profile script
# that ensures every user gets immediate, per-command history writes so
# Cribl Edge can tail the file in near-real-time.
# ---------------------------------------------------------------------------

- name: Configure immediate bash history persistence for all users
  ansible.builtin.copy:
    dest: /etc/profile.d/bash_history_persist.sh
    owner: root
    group: root
    mode: "0644"
    content: |
      # Written by Ansible — ensures .bash_history exists and flushes
      # after every command so Cribl Edge can tail the file.
      export HISTFILE="$HOME/.bash_history"
      export HISTSIZE=10000
      export HISTFILESIZE=20000
      export HISTTIMEFORMAT="%F %T "
      shopt -s histappend
      PROMPT_COMMAND="history -a;${PROMPT_COMMAND}"
